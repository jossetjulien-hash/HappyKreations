<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!--
    HappyKreations — logo HK
    Identité 2026 : monogramme manuscrit + brin d'eucalyptus.
    Variables CSS exploitables côté HTML :
      --hk-bg     : couleur de fond (par défaut crème #FBF6EF)
      --hk-mark   : couleur du monogramme (par défaut rose deep)
      --hk-stem   : couleur de la tige
      --hk-leaf   : couleur des feuilles
      --hk-bud    : couleur du bouton rose au sommet
      --hk-border : couleur du liseré (transparent par défaut)
  -->
  <defs>
    <style><![CDATA[
      .bg     { fill: var(--hk-bg,    #FBF6EF); }
      .border { fill: none; stroke: var(--hk-border, rgba(126,148,122,0.18)); stroke-width: 2; }
      .stem   { stroke: var(--hk-stem, #C98388); stroke-width: 5; stroke-linecap: round; fill: none; }
      .leaf   { fill: var(--hk-leaf, #C98388); opacity: 0.85; }
      .bud    { fill: var(--hk-bud,  #E7B5B8); }
      .mark   {
        fill: var(--hk-mark, #C98388);
        font-family: "Caveat", "Brush Script MT", "Snell Roundhand", cursive;
        font-weight: 700;
        font-size: 280px;
      }
    ]]></style>
  </defs>

  <!-- Fond arrondi -->
  <rect class="bg" x="0" y="0" width="512" height="512" rx="96" ry="96"/>
  <rect class="border" x="8" y="8" width="496" height="496" rx="92" ry="92"/>

  <!-- Brin d'eucalyptus centré au-dessus du monogramme -->
  <g transform="translate(256 130)">
    <!-- Tige -->
    <path class="stem" d="M0,76 C0,52 0,28 0,8"/>
    <!-- Feuilles (3 paires, taille croissante vers le bas) -->
    <g class="leaf">
      <ellipse cx="-22" cy="58" rx="18" ry="8" transform="rotate(-32 -22 58)"/>
      <ellipse cx="22"  cy="58" rx="18" ry="8" transform="rotate(32  22 58)"/>
      <ellipse cx="-20" cy="38" rx="16" ry="7" transform="rotate(-28 -20 38)"/>
      <ellipse cx="20"  cy="38" rx="16" ry="7" transform="rotate(28  20 38)"/>
      <ellipse cx="-14" cy="20" rx="13" ry="6" transform="rotate(-25 -14 20)"/>
      <ellipse cx="14"  cy="20" rx="13" ry="6" transform="rotate(25  14 20)"/>
    </g>
    <!-- Bouton rose au sommet -->
    <ellipse class="bud" cx="0" cy="-8" rx="13" ry="16"/>
  </g>

  <!-- Monogramme « hk » manuscrit -->
  <text x="256" y="400" text-anchor="middle" class="mark">hk</text>
</svg>
