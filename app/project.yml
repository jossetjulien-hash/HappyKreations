name: HappyKreations
options:
  bundleIdPrefix: com.happykreations
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.20.0

targets:
  HappyKreations:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - path: HappyKreations/Sources
      - path: HappyKreations/Resources
    resources:
      - HappyKreations/Resources/Assets.xcassets
    info:
      path: HappyKreations/Info.plist
      properties:
        CFBundleDisplayName: HappyKreations
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.happykreations.app
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        ENABLE_PREVIEWS: YES
        SWIFT_VERSION: "5.10"
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: NO
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
    dependencies:
      - package: Supabase
        product: Supabase
    entitlements:
      path: HappyKreations/HappyKreations.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-write: true
